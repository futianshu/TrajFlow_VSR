project:
  name: trajflow-vsr
  experiment: eval_no_reference_real_world
  output_dir: outputs/eval_no_reference
runtime:
  seed: 20260524
  device: cpu
  dry_run: true
data:
  name: frame_manifest
  manifest_path: data/splits/videolq_real_test_manifest.json
  layout: generic
  batch_size: 1
  frames: 8
  channels: 3
  scale: 4.0
  clip_index: 0
  require_paired: false
  protocol: no_reference_qualitative
model:
  name: trajflow_vsr
  in_channels: 3
  out_channels: 3
  hidden_channels: 48
  tokenizer:
    hidden_channels: 48
  uncertainty:
    hidden_channels: 48
    degradation_dim: 8
  transport:
    temperature: 0.2
    sinkhorn_iterations: 12
    unbalanced_floor: 0.05
    bridge_steps: 3
    spatial_radius: 4
    temporal_radius: 2
  memory:
    hidden_channels: 48
    scan_policy: ot_sb
    use_koopman: true
  flow:
    hidden_channels: 48
    teacher_steps: 2
  decoder:
    hidden_channels: 48
  consistency:
    strength: 0.2
evaluation:
  name: no_reference_real_world_protocol
  protocol: no_reference
  reference_free: true
  mode: offline
  clip_count: 4
  checkpoint_path: null
  save_results: false
  metric_backend: proxy
  profile_macs: false
  posterior_samples: 0
  official_metric_candidates: ["niqe", "musiq", "clipiqa"]
  metrics: ["temporal_activity", "spatial_sharpness", "blockiness", "causal_violation", "latency_seconds", "fps", "megapixels_per_second", "vram_gb", "niqe", "musiq", "clipiqa"]
