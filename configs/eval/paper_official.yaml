project:
  name: trajflow-vsr
  experiment: paper_official_eval
  output_dir: outputs/paper_official_eval
runtime:
  seed: 20260524
  device: cpu
  dry_run: true
data:
  name: frame_manifest
  manifest_path: data/splits/YOUR_DATASET_test_manifest.json
  layout: generic
  batch_size: 1
  frames: 15
  channels: 3
  scale: 4.0
  clip_index: 0
model:
  name: trajflow_vsr
  in_channels: 3
  out_channels: 3
  hidden_channels: 64
  tokenizer:
    hidden_channels: 64
  uncertainty:
    hidden_channels: 64
    degradation_dim: 8
  transport:
    temperature: 0.18
    sinkhorn_iterations: 24
    unbalanced_floor: 0.08
    bridge_steps: 4
    spatial_radius: 6
    temporal_radius: 4
  memory:
    hidden_channels: 64
    scan_policy: ot_sb
    use_koopman: true
  flow:
    hidden_channels: 64
    enabled: true
    teacher_steps: 2
  decoder:
    hidden_channels: 64
  consistency:
    strength: 0.25
evaluation:
  name: paper_official_protocol
  mode: mixed
  clip_count: 4
  checkpoint_path: null
  save_results: true
  metric_backend: official
  profile_macs: true
  posterior_samples: 4
  official_metric_candidates: ["lpips", "dists", "niqe", "musiq", "clipiqa", "vmaf", "fvd"]
  metrics: ["psnr", "ssim", "temporal_delta_error", "tof", "lpips", "dists", "uncertainty_error_correlation", "reliability_ece", "selective_reconstruction_auc", "causal_violation", "latency_seconds", "fps", "megapixels_per_second", "vram_gb"]
