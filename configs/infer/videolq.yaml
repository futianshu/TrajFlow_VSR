project:
  name: trajflow-vsr
  experiment: infer_videolq_real_world
  output_dir: outputs/inference_videolq
runtime:
  seed: 20260524
  device: cpu
  dry_run: true
data:
  name: frame_sequence
  source: videolq
  root: /home/ubuntu/data/VideoLQ/Input
  scale: 4.0
model:
  name: trajflow_vsr
  in_channels: 3
  out_channels: 3
  hidden_channels: 48
  tokenizer:
    hidden_channels: 48
  uncertainty:
    hidden_channels: 48
    degradation_dim: 8
  transport:
    temperature: 0.2
    sinkhorn_iterations: 12
    unbalanced_floor: 0.05
    bridge_steps: 3
    spatial_radius: 4
    temporal_radius: 2
  memory:
    hidden_channels: 48
    scan_policy: ot_sb
    use_koopman: true
  flow:
    hidden_channels: 48
    teacher_steps: 2
  decoder:
    hidden_channels: 48
  consistency:
    strength: 0.2
inference:
  mode: offline
  input_path: /home/ubuntu/data/VideoLQ/Input/000
  output_dir: outputs/inference_videolq/000
  scale: 4.0
  image_format: png
  max_frames: 16
  checkpoint_path: null
  save_raw: false
  sample_flow_noise: false
  posterior_samples: 0
  export_visualization: true
  max_visualization_frames: 2
  top_edges: 32
