project:
  name: trajflow-vsr
  experiment: stage_e_vimeo90k_mild_real_x4
  output_dir: outputs/stage_e_vimeo90k_mild_real_x4
stage:
  name: stage_e_streaming
  mode: mixed
  objective: vimeo90k_mild_real_x4_offline_streaming_joint_training
runtime:
  seed: 20260524
  device: cpu
  dry_run: true
data:
  name: frame_manifest
  manifest_path: data/splits/vimeo90k_mild_real_x4_train_manifest.json
  layout: vimeo90k
  require_paired: true
  batch_size: 1
  frames: 31
  channels: 3
  scale: 4.0
  clip_index: 0
  clip_stride: 1
  sample_sequential_clips: true
model:
  name: trajflow_vsr
  in_channels: 3
  out_channels: 3
  hidden_channels: 64
  tokenizer:
    hidden_channels: 64
  uncertainty:
    hidden_channels: 64
    degradation_dim: 8
  transport:
    temperature: 0.18
    sinkhorn_iterations: 24
    unbalanced_floor: 0.08
    bridge_steps: 4
    spatial_radius: 6
    temporal_radius: 3
  memory:
    hidden_channels: 64
    scan_policy: ot_sb
    use_koopman: true
  flow:
    hidden_channels: 64
    enabled: true
    gate_max: 0.25
    amplitude_limit: 0.25
    bandlimit_kernel_size: 3
    teacher_steps: 1
  decoder:
    hidden_channels: 64
  consistency:
    strength: 0.25
  pretrained:
    path: checkpoints/stage_d_vimeo90k_mild_real_x4/best.pt
    components: ["tokenizer", "uncertainty", "transport", "memory", "flow", "decoder", "consistency"]
    freeze_components: []
    strict: false
losses:
  charbonnier: 0.8
  optimal_transport: 0.02
  schrodinger_bridge: 0.02
  koopman: 0.03
  flow_matching: 0.05
  residual_amplitude: 0.05
  residual_low_frequency: 0.1
  distillation: 0.20
  data_consistency: 0.25
  temporal: 0.20
  streaming: 0.20
  wavelet_frequency: 0.12
  anti_aliasing: 0.02
  trajectory: 0.02
  uncertainty: 0.05
optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.0001
  max_steps: 100000
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  amp: true
scheduler:
  name: cosine
  eta_min: 0.0000005
checkpoint:
  output_dir: checkpoints/stage_e_vimeo90k_mild_real_x4
  resume_path: null
  save_every_steps: 1000
  save_final: true
  save_history: true
validation:
  enabled: true
  config: configs/eval/frame_manifest.yaml
  every_steps: 1000
  metric: temporal_delta_error
  direction: min
  mode: mixed
  overrides: ["data.name=frame_manifest", "data.manifest_path=data/splits/vimeo90k_mild_real_x4_val_manifest.json", "data.require_paired=true", "evaluation.clip_count=4", "evaluation.mode=mixed", "evaluation.save_results=true"]
