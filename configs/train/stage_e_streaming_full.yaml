project:
  name: trajflow-vsr
  experiment: stage_e_streaming_full
  output_dir: outputs/stage_e_streaming_full
stage:
  name: stage_e_streaming
  mode: mixed
  objective: full_manifest_offline_streaming_joint_training
runtime:
  seed: 20260524
  device: cpu
  dry_run: true
data:
  name: frame_manifest
  manifest_path: data/splits/YOUR_DATASET_train_manifest.json
  layout: generic
  require_paired: true
  batch_size: 1
  frames: 31
  channels: 3
  scale: 4.0
  clip_index: 0
  clip_stride: 1
  sample_sequential_clips: true
model:
  name: trajflow_vsr
  in_channels: 3
  out_channels: 3
  hidden_channels: 64
  tokenizer:
    hidden_channels: 64
  uncertainty:
    hidden_channels: 64
    degradation_dim: 8
  transport:
    temperature: 0.18
    sinkhorn_iterations: 24
    unbalanced_floor: 0.08
    bridge_steps: 4
    spatial_radius: 6
    temporal_radius: 4
  memory:
    hidden_channels: 64
    scan_policy: ot_sb
    use_koopman: true
  flow:
    hidden_channels: 64
    enabled: true
    gate_max: 0.25
    amplitude_limit: 0.25
    bandlimit_kernel_size: 3
    teacher_steps: 2
  decoder:
    hidden_channels: 64
  consistency:
    strength: 0.25
  pretrained:
    path: checkpoints/stage_d_distill_full/best.pt
    components: ["tokenizer", "uncertainty", "transport", "memory", "flow", "decoder", "consistency"]
    freeze_components: []
    strict: false
losses:
  charbonnier: 0.25
  optimal_transport: 0.005
  schrodinger_bridge: 0.01
  koopman: 0.01
  flow_matching: 0.15
  bridge_consistency: 0.05
  residual_amplitude: 0.05
  residual_low_frequency: 0.1
  distillation: 0.5
  teacher_target: 0.05
  streaming_causality: 1.0
  data_consistency: 0.25
  temporal: 0.2
  wavelet_frequency: 0.12
  anti_aliasing: 0.02
  trajectory: 0.01
  uncertainty: 0.05
optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.0001
  max_steps: 100000
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  amp: true
scheduler:
  name: cosine
  eta_min: 0.0000005
checkpoint:
  output_dir: checkpoints/stage_e_streaming_full
  resume_path: null
  save_every_steps: 1000
  save_final: true
  save_history: true
validation:
  enabled: true
  config: configs/eval/streaming.yaml
  every_steps: 1000
  metric: causal_violation
  direction: min
  mode: streaming
  overrides: ["data.name=frame_manifest", "data.manifest_path=data/splits/YOUR_DATASET_val_manifest.json", "evaluation.clip_count=4", "evaluation.mode=mixed", "evaluation.save_results=true"]
