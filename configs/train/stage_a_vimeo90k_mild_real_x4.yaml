project:
  name: trajflow-vsr
  experiment: stage_a_vimeo90k_mild_real_x4
  output_dir: outputs/stage_a_vimeo90k_mild_real_x4
stage:
  name: stage_a_tokenizer
  mode: offline
  objective: vimeo90k_mild_real_x4_degradation_pretraining
runtime:
  seed: 20260524
  device: cpu
  dry_run: true
data:
  name: frame_manifest
  manifest_path: data/splits/vimeo90k_mild_real_x4_train_manifest.json
  layout: vimeo90k
  require_paired: true
  require_degradation: true
  batch_size: 1
  frames: 7
  channels: 3
  scale: 4.0
  clip_index: 0
  clip_stride: 1
  sample_sequential_clips: true
model:
  name: trajflow_vsr
  in_channels: 3
  out_channels: 3
  hidden_channels: 48
  mask_ratio: 0.25
  tokenizer:
    hidden_channels: 48
  uncertainty:
    hidden_channels: 48
    degradation_dim: 8
losses:
  masked_reconstruction: 1.0
  degradation: 0.5
  artifact: 0.25
  reliability: 0.1
  charbonnier: 0.0
  koopman: 0.0
  flow_matching: 0.0
  data_consistency: 0.1
  uncertainty: 0.1
optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.0
  max_steps: 100000
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  amp: true
scheduler:
  name: cosine
  eta_min: 0.000001
checkpoint:
  output_dir: checkpoints/stage_a_vimeo90k_mild_real_x4
  resume_path: null
  save_every_steps: 1000
  save_final: true
  save_history: true
