base_config: configs/train/stage_b_deterministic.yaml
ablation:
  name: stage_b_context_length_grid
  purpose: compare_long_context_lengths_for_stage_b_trajectory_memory
  metric_focus: ["psnr", "ssim", "temporal_delta_error", "fps", "latency_seconds"]
  evaluation_config: configs/eval/offline.yaml
  common_overrides: ["checkpoint.save_final=true", "data.height=8", "data.width=8"]
  evaluation_overrides: ["evaluation.save_results=true"]
  selection:
    mode: offline
    metrics: ["psnr", "ssim", "temporal_delta_error", "fps"]
    directions:
      psnr: max
      ssim: max
      temporal_delta_error: min
      fps: max
    weights:
      psnr: 0.35
      ssim: 0.25
      temporal_delta_error: 0.25
      fps: 0.15
  variants:
    frames_3: ["data.frames=3"]
    frames_7: ["data.frames=7"]
    frames_15: ["data.frames=15"]
    frames_31: ["data.frames=31"]
    frames_63: ["data.frames=63"]
